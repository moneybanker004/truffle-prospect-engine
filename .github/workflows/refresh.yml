name: Refresh prospect data

# Runs the enrichment pipeline on a schedule and commits the updated SQLite
# db back to the repo. Streamlit Community Cloud auto-redeploys on every
# push, so this is what makes the dashboard "always on" without needing a
# dedicated background server (Streamlit Cloud itself only runs on-demand).
#
# Also runs on every push to source files, so a scoring/config change shows
# up with fresh data immediately rather than waiting for the next schedule.
on:
  schedule:
    - cron: "0 13 * * *" # daily, 13:00 UTC / ~9am ET
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab
  push:
    branches: [master]
    paths:
      - "src/**"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run enrichment pipeline
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python -m src.pipeline

      - name: Commit updated data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prospects.db
          git diff --staged --quiet || git commit -m "Automated data refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
